version: "3.9"

services:
  # 🧠 Zookeeper
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: chat_zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  # ⚡ Kafka
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: chat_kafka
    restart: always
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      # ✅ Correct internal + external config
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # 🗄 MongoDB
  mongo:
    image: mongo:6
    container_name: chat_mongo
    restart: always
    volumes:
      - mongo_data:/data/db

  # 🚀 Backend
  server:
    build: ./server
    container_name: chat_server
    restart: always
    ports:
      - "5001:5001"
    env_file:
      - .env
    depends_on:
      - mongo
      - kafka

  # 🎨 Frontend
  client:
    build: ./client
    container_name: chat_client
    restart: always
    depends_on:
      - server

  # 🌐 Nginx (reverse proxy)
  nginx:
    image: nginx:latest
    container_name: chat_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - client
      - server

volumes:
  mongo_data: